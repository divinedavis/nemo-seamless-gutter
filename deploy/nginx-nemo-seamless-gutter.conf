server {
    server_name nemoseamlessgutter.com www.nemoseamlessgutter.com 104.236.120.144;

    # www and non-www both resolve here, so without this nginx serves the
    # whole site twice under two hostnames. Canonical tags already point at
    # the bare domain; this makes it a real 301 so crawlers and any old
    # www links consolidate on one host.
    if ($host = www.nemoseamlessgutter.com) {
        return 301 https://nemoseamlessgutter.com$request_uri;
    }

    root /var/www/nemo-seamless-gutter;
    index index.html;

    location ^~ /server/ { deny all; return 404; }
    location ^~ /seo/ { deny all; return 404; }
    location ~ /\.(?!well-known) { deny all; return 404; }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Booking API -> Node on 3009
    location /api/ {
        proxy_pass http://127.0.0.1:3009;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Booking management pages (owner cancel/decline links) -> Node
    location /booking/ {
        proxy_pass http://127.0.0.1:3009;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Owner day-control page (open/close a day for weather) -> Node.
    # Signed-link gated in the app; noindex so it never reaches a crawler.
    location /owner/ {
        proxy_pass http://127.0.0.1:3009;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/nemoseamlessgutter.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nemoseamlessgutter.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.nemoseamlessgutter.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = nemoseamlessgutter.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name nemoseamlessgutter.com www.nemoseamlessgutter.com 104.236.120.144;
    return 404; # managed by Certbot




}